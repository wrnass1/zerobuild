global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["gateway:8080"]

  - job_name: auth-service
    metrics_path: /metrics
    static_configs:
      - targets: ["auth-service:8000"]

  - job_name: idea-service
    metrics_path: /metrics
    static_configs:
      - targets: ["idea-service:8002"]

  - job_name: kanban-service
    metrics_path: /metrics
    static_configs:
      - targets: ["kanban-service:8003"]

  - job_name: matching-service
    metrics_path: /metrics
    static_configs:
      - targets: ["matching-service:8001"]
